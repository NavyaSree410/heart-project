<!DOCTYPE html>
<html>
<head>
  <title>3D Thread Heart</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }

    .text {
      position: absolute;
      top: 50%;
      font-size: 70px;
      color: white;
      display: none;
      font-family: Arial;
    }

    /* Slightly more distance from heart */
    #leftText {
      left: 50%;
      transform: translate(-180px, -50%);
    }

    #rightText {
      left: 50%;
      transform: translate(140px, -50%);
    }
  </style>
</head>
<body>

<div id="leftText" class="text">I</div>
<div id="rightText" class="text">U</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Raycaster for click detection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Heart points (math shape)
let points = [];
for (let t = 0; t < Math.PI * 2; t += 0.04) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2*t)
          - 2 * Math.cos(3*t)
          - Math.cos(4*t);
    points.push(new THREE.Vector3(x/6, y/6, 0));
}

// Group to hold heart
const heartGroup = new THREE.Group();
scene.add(heartGroup);

let center = new THREE.Vector3(0,0,0);
const material = new THREE.LineBasicMaterial({ color: 0xff0000 });

let index = 0;

// Draw thread lines
function drawThread() {
    if (index >= points.length) return;

    let geometry = new THREE.BufferGeometry().setFromPoints([
        center,
        points[index],
        center
    ]);

    let line = new THREE.Line(geometry, material);
    heartGroup.add(line);

    index++;
}

// Camera position
camera.position.z = 10;

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    if (index < points.length) {
        drawThread();
    }

    heartGroup.rotation.y += 0.01;

    renderer.render(scene, camera);
}
animate();

// Click detection on heart only
window.addEventListener("click", (event) => {

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(heartGroup.children);

    if (intersects.length > 0) {
        document.getElementById("leftText").style.display = "block";
        document.getElementById("rightText").style.display = "block";
    }
});

// Resize fix
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
